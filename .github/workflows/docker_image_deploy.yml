name: Docker Image Deploy (Reusable)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow — call from any project repo via:
#
#   jobs:
#     Deploy:
#       uses: Vikrams098/Dependencies/.github/workflows/docker_image_deploy.yml@main
#       with:
#         image_name:     your-image-name
#         container_name: your-container-name
#       secrets:
#         # ── Common secrets (same across all projects) ──────────────────────
#         DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
#         DOCKERHUB_TOKEN:       ${{ secrets.DOCKERHUB_TOKEN }}
#         S3_DEPLOY_ACCESS_KEY:  ${{ secrets.S3_DEPLOY_ACCESS_KEY }}
#         S3_DEPLOY_SECRET_KEY:  ${{ secrets.S3_DEPLOY_SECRET_KEY }}
#         AWS_REGION:            ${{ secrets.AWS_REGION }}
#         # ── Project-specific secrets (change per project) ──────────────────
#         EC2_INSTANCE_ID:       ${{ secrets.EC2_INSTANCE_ID }}
#         S3_DEPLOY_BUCKET_NAME: ${{ secrets.S3_DEPLOY_BUCKET_NAME }}
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker Hub image name without username (e.g. kvs-cafe)
        required: true
        type: string
      container_name:
        description: Container name used on the EC2 host (e.g. kvs-cafe-app)
        required: true
        type: string
    secrets:
      # ── Common secrets (same across all projects) ────────────────────────
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      S3_DEPLOY_ACCESS_KEY:
        required: true
      S3_DEPLOY_SECRET_KEY:
        required: true
      AWS_REGION:
        required: true
      # ── Project-specific secrets (uncommon — differ per project) ─────────
      EC2_INSTANCE_ID:
        required: true
      S3_DEPLOY_BUCKET_NAME:
        required: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Version ───────────────────────────────────────────────────────────────
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: set
        run: |
          EXACT=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$EXACT" ]; then
            echo "version=${EXACT}" >> "$GITHUB_OUTPUT"
            echo "Version: ${EXACT} (exact tag)"
            exit 0
          fi

          LAST_TAG=$(git tag --merged HEAD --sort=-v:refname \
                       | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="v1.0.0"
          else
            MAJOR=$(echo "$LAST_TAG" | sed 's/v\([0-9]*\)\..*/\1/')
            MINOR=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            PATCH=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')

            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")

            if echo "$COMMITS" | grep -qE '(BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:)'; then
              BUMP="major"; MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMITS" | grep -qE '^feat(\([^)]+\))?:'; then
              BUMP="minor"; MINOR=$((MINOR + 1)); PATCH=0
            else
              BUMP="patch"; PATCH=$((PATCH + 1))
            fi

            echo "Bump: ${BUMP} (${LAST_TAG} → v${MAJOR}.${MINOR}.${PATCH})"
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

  # ── 2. Build · Scan · Push ───────────────────────────────────────────────────
  build:
    name: Build · Scan · Push
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:scan-target
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          provenance: true
          sbom: true

  # ── 3. Deploy to EC2 via SSM (with rollback) ─────────────────────────────────
  deploy-ec2:
    name: Deploy to EC2
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.S3_DEPLOY_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.S3_DEPLOY_SECRET_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM with rollback
        run: |
          cat > /tmp/deploy.sh << VARS
          DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'
          DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}'
          DOCKER_IMAGE='${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}'
          IMAGE_TAG='${{ needs.version.outputs.version }}'
          CONTAINER_NAME='${{ inputs.container_name }}'
          VARS

          cat >> /tmp/deploy.sh << 'SCRIPT'
          set -euo pipefail

          APP_PORT="${APP_PORT:-3000}"
          OLD_CONTAINER="${CONTAINER_NAME}-old"
          IMAGE="${DOCKER_IMAGE}:${IMAGE_TAG}"

          echo "==> Authenticating with Docker Hub"
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          echo "==> Pulling ${IMAGE}"
          docker pull "$IMAGE"

          CURRENT_ID=$(docker ps -aq -f "name=^${CONTAINER_NAME}$")
          if [ -n "$CURRENT_ID" ]; then
            echo "==> Stopping ${CONTAINER_NAME} → saving as ${OLD_CONTAINER}"
            docker stop "$CONTAINER_NAME"
            docker rm -f "$OLD_CONTAINER" 2>/dev/null || true
            docker rename "$CONTAINER_NAME" "$OLD_CONTAINER"
          fi

          echo "==> Starting ${CONTAINER_NAME}"
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "${APP_PORT}:3000" \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            -v "${CONTAINER_NAME}-data:/app/data" \
            -e NODE_ENV=production \
            "$IMAGE"

          echo "==> Waiting for health check..."
          HEALTHY=false
          for i in $(seq 1 8); do
            sleep 5
            CSTATUS=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo "gone")
            HSTATUS=$(docker inspect \
                        --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                        "$CONTAINER_NAME" 2>/dev/null || echo "gone")
            echo "   attempt ${i}/8 — container: ${CSTATUS}, health: ${HSTATUS}"
            if [ "$HSTATUS" = "healthy" ]; then HEALTHY=true; break; fi
            if [ "$CSTATUS" != "running" ]; then echo "   Container exited unexpectedly."; break; fi
          done

          if [ "$HEALTHY" = "true" ]; then
            echo "==> Deployment successful! ${IMAGE} is healthy."
            docker logout; exit 0
          fi

          echo "==> Health check failed — rolling back..."
          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm   "$CONTAINER_NAME" 2>/dev/null || true

          if [ -n "$CURRENT_ID" ]; then
            docker rename "$OLD_CONTAINER" "$CONTAINER_NAME"
            docker start  "$CONTAINER_NAME"
            echo "==> Rollback complete — previous version restored."
          else
            echo "==> No previous container to restore."
          fi

          docker logout; exit 1
          SCRIPT

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n --rawfile s /tmp/deploy.sh '{commands: [$s]}')" \
            --output text \
            --query 'Command.CommandId')

          echo "SSM Command ID: $COMMAND_ID"

          STATUS="InProgress"
          for i in $(seq 1 36); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "   attempt ${i}/36 — status: ${STATUS}"
            if [[ "$STATUS" =~ ^(Success|Failed|Cancelled|TimedOut)$ ]]; then break; fi
          done

          echo "── EC2 Output ──────────────────────────────────────────"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'StandardOutputContent' --output text

          if [ "$STATUS" != "Success" ]; then
            echo "── EC2 Error ───────────────────────────────────────────"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'StandardErrorContent' --output text
            exit 1
          fi

  # ── 4. Deploy Frontend to S3 ─────────────────────────────────────────────────
  deploy-s3:
    name: Deploy to S3
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.S3_DEPLOY_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.S3_DEPLOY_SECRET_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUCKET:  ${{ secrets.S3_DEPLOY_BUCKET_NAME }}
        run: |
          echo "==> Deploying ${VERSION} to s3://${BUCKET}"

          aws s3 sync ./frontend "s3://${BUCKET}/releases/${VERSION}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata "version=${VERSION},commit=${{ github.sha }},run=${{ github.run_number }}"

          echo "    Archived: s3://${BUCKET}/releases/${VERSION}/"

          aws s3 sync ./frontend "s3://${BUCKET}/" \
            --delete \
            --exclude "releases/*" \
            --cache-control "public, max-age=300" \
            --metadata "version=${VERSION}"

          echo "==> Live site updated to version ${VERSION}."
